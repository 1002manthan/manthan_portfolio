<!DOCTYPE html>
<html>
<head>
  <base href="/manthan_portfolio/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Manthan Suthar — Flutter Developer & UI/UX Designer Portfolio">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="mnthn.png">
  <title>Manthan Suthar — Portfolio</title>
  <link rel="manifest" href="manifest.json">
  <script>
    const serviceWorkerVersion = "3825294217" /* Flutter's service worker is deprecated and will be removed in a future Flutter release. */;
  </script>
  <script src="flutter.js" defer></script>
  <style>
    body {
      background-color: #FAFAFA;
      margin: 0;
      padding: 0;
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Georgia', serif;
      color: #E8173A;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
    }
    .loader {
      width: 40px; height: 40px;
      border: 3px solid #FFE4E8;
      border-top-color: #E8173A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
    Loading Portfolio...
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: { serviceWorkerVersion: serviceWorkerVersion },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            document.getElementById('loading').style.display = 'none';
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
